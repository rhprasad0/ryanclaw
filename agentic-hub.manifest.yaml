_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: Agentic Hub
  description: One-way webhook relay from home server to Slack channels.

features:
  bot_user:
    display_name: agentic-hub
    always_online: true

oauth_config:
  scopes:
    bot:
      - incoming-webhook

settings:
  incoming_webhooks:
    incoming_webhooks_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
